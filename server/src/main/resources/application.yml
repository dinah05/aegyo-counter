spring:
  application:
    name: aegyo-counter-server
  profiles:
    active: local
  datasource:
    url: jdbc:h2:mem:aegyo;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  # Railway 등은 PORT 환경변수를 주입한다. 없으면 8080.
  port: ${PORT:8080}

# 카운터 리셋 비밀번호 (env: COUNTER_RESET_PASSWORD)
counter:
  reset-password: ${COUNTER_RESET_PASSWORD:}

# Discord 웹훅 알림 설정
# enabled=false면 실제 전송 대신 로그로 대체(로컬 기본값)
discord:
  webhook:
    enabled: ${DISCORD_WEBHOOK_ENABLED:false}
    url: ${DISCORD_WEBHOOK_URL:}
    username: 애교 카운터
    # count가 이 값을 넘어서는 순간 알림 전송 (기본 50)
    threshold: ${NOTIFICATION_THRESHOLD:50}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health, info
